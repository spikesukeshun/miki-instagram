name: Instagram自動投稿

on:
  schedule:
    # 毎日2回チェック（post_scheduler.pyが投稿日時を見て判断する）
    # 日本時間 21:00 = UTC 12:00（毎日）
    - cron: "0 12 * * *"
    # 日本時間 12:00 = UTC 3:00（毎日）
    - cron: "0 3 * * *"
  workflow_dispatch:  # 手動実行ボタン（GOの代わり）

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ライブラリをインストール
        run: pip install -r requirements.txt

      - name: credentials.jsonを復元
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: echo "$GOOGLE_CREDENTIALS" > credentials.json

      - name: credentials.jsonを検証
        run: |
          python3 -c "
          import json, sys
          content = open('credentials.json').read().strip()
          if not content:
              print('ERROR: GOOGLE_CREDENTIALS シークレットが空です')
              sys.exit(1)
          try:
              data = json.loads(content)
          except json.JSONDecodeError as e:
              print(f'ERROR: JSONが不正です: {e}')
              sys.exit(1)
          if data.get('type') != 'service_account':
              print('ERROR: type が service_account ではありません')
              sys.exit(1)
          print(f'OK: credentials 検証完了 (project_id={data.get(\"project_id\",\"?\")})')
          "

      - name: 自動投稿を実行
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID_SHUNSUKE: ${{ secrets.LINE_USER_ID_SHUNSUKE }}
          LINE_USER_ID_MIKI: ${{ secrets.LINE_USER_ID_MIKI }}
        run: python post_scheduler.py

      - name: 失敗時LINE通知
        if: failure()
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID_SHUNSUKE: ${{ secrets.LINE_USER_ID_SHUNSUKE }}
          LINE_USER_ID_MIKI: ${{ secrets.LINE_USER_ID_MIKI }}
        run: |
          python3 -c "
          import os, sys
          sys.path.insert(0, '.')
          from line_notify import send_line_message
          send_line_message('❌ GitHub Actions 失敗: post.yml\n自動投稿ワークフローでエラーが発生しました。\nGitHub Actions のログを確認してください。')
          "
